<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issues Tracker</title>

    <!-- daisyUI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="w-[520px] mx-auto my-10 p-8 bg-gray-100 shadow-2xl">
        <div class="text-center">
            <img class="mx-auto max-w-20 pb-3" src="./assets/github-logo.png" alt="github-logo">
            <h1 class="text-2xl font-semibold text-black">GitHub Issues Tracker</h1>
            <p class="text-bage">Sign in to manage your issues</p>
        </div>
        <div class="space-y-2 mt-5">
            <div class="space-y-1">
                <label class="block font-bold text-black" for="">User name</label>
                <input id="inpurUsername" 
                class="w-full p-2 rounded-lg" type="text" placeholder="Enter user name">
                <p class="text-blue-500 text-sm">Default: admin</p>
            </div>
            <div class="space-y-1 mb-5">
                <label class="block font-bold text-black" for="">Password</label>
                <input id="inpurPassword" 
                class="w-full p-2 rounded-lg" type="password" placeholder="Enter password">
                <p class="text-blue-500 text-sm">Default: admin123</p>                
            </div>
            <div class="space-y-6 text-center">
                <button id="btn-singin"
                class="btn btn-primary w-full p-2">Sing in</button>
                <div class="relative">
                    <hr>
                    <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                        <p class="bg-gray-100 p-1">Or</p>
                    </div>
                </div>
                <p class="text-sm">Demo Credentials:</p>
                <div>
                    <p class="font-bold"><span class="text-black">Username:</span> admin</p>
                    <p class="font-bold"><span class="text-black">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </main>
    

    <script src="./login.js"></script>
</body>
</html>
