                <button onclick="switchBtn('search-btn')" id="search-btn" class="btn btn-primary">Search</button>
            </div>

                <!-- Open Button -->
                <button onclick="switchBtn('openn-btn')" id="openn-btn" class="btn btn-outline mx-2 px-10">Open</button>

                <!-- Closed Button -->
                <button onclick="switchBtn('closed-btn')" id="closed-btn" class="btn btn-outline px-10">Closed</button>
            </div>
        </section>

                    </div>
                </div>
                <div class="flex gap-5">
                    <div class="flex justify-between gap-2 items-center">
                        <i id="open-icon" class="fa-solid fa-circle text-green-100 text-sm"></i>
                        <p class="text-black">Open</p>
                    </div>
                    <div class="flex justify-between gap-2 items-center">
                        <i id="closed-icon" class="fa-solid fa-circle text-purple-100 text-sm"></i>
                        <p class="text-black">Closed</p>
                    </div>
                </div>
            </div>

                <div id="open-content-container" class="m-6 gap-3 grid grid-cols-4 hidden">

                <div id="closed-content-container" class="m-6 gap-3 grid grid-cols-4 hidden">
